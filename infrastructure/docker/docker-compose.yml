version: '3.9'

services:
  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: '3000'
      HOST: '0.0.0.0'
      HEADLESS: 'true'
      DEFAULT_TIMEOUT: '10000'
      LOG_LEVEL: info
      DATABASE_URL: postgresql://humanhands:humanhands@postgres:5432/humanhands
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - humanhands

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: humanhands
      POSTGRES_PASSWORD: humanhands
      POSTGRES_DB: humanhands
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U humanhands']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - humanhands

volumes:
  postgres_data:

networks:
  humanhands:
    driver: bridge
